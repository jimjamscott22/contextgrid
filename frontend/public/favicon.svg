<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#0f1117"/>

  <!-- Grid cells — 3x3, 8px each with 2px gaps, starting at x=3, y=3 -->

  <!-- Row 1 -->
  <rect x="3"  y="3"  width="8" height="8" rx="1.5" fill="#2a2d3a"/>
  <rect x="13" y="3"  width="8" height="8" rx="1.5" fill="#00e5a0" opacity="0.9"/>
  <rect x="23" y="3"  width="6" height="8" rx="1.5" fill="#2a2d3a"/>

  <!-- Row 2 -->
  <rect x="3"  y="13" width="8" height="8" rx="1.5" fill="#00e5a0" opacity="0.9"/>
  <rect x="13" y="13" width="8" height="8" rx="1.5" fill="#00b8ff" opacity="0.8"/>
  <rect x="23" y="13" width="6" height="8" rx="1.5" fill="#00e5a0" opacity="0.6"/>

  <!-- Row 3 -->
  <rect x="3"  y="23" width="8" height="6" rx="1.5" fill="#2a2d3a"/>
  <rect x="13" y="23" width="8" height="6" rx="1.5" fill="#2a2d3a"/>
  <rect x="23" y="23" width="6" height="6" rx="1.5" fill="#00b8ff" opacity="0.5"/>
</svg>
