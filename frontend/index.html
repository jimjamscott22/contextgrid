<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ContextGrid</title>
    <script>
      (() => {
        let stored = null;
        try {
          stored = localStorage.getItem("cg-theme");
        } catch (error) {
          stored = null;
        }
        const themes = {
          "light-plus": "light",
          "dark-plus": "dark",
          "monokai": "dark",
          "solarized-light": "light",
          "solarized-dark": "dark",
          "github-light": "light",
          "github-dark": "dark",
          "high-contrast": "dark",
        };
        if (stored === "dark") stored = "dark-plus";
        if (stored === "light") stored = "light-plus";
        if (themes[stored]) {
          document.documentElement.setAttribute("data-theme", stored);
          document.documentElement.setAttribute("data-theme-mode", themes[stored]);
          return;
        }
        let theme = "light-plus";
        if (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches) {
          theme = "dark-plus";
        }
        document.documentElement.setAttribute("data-theme", theme);
        document.documentElement.setAttribute("data-theme-mode", themes[theme]);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
